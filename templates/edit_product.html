<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; }
        nav { background: #333; padding: 10px; text-align: center; }
        nav a { margin: 0 10px; text-decoration: none; color: white; }

        .form-container {
            width: 500px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .submit-btn:hover { background: #0056b3; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">Home</a>
        <a href="/product">Products</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/dashboard">Dashboard</a>
    </nav>

    <div class="form-container">
        <h1>Edit Product</h1>

        <form method="POST" action="/edit/{{ product['id'] }}">
            <label>Product Name</label>
            <input type="text" name="name" value="{{ product['name'] }}" required>

            <label>Price (USD)</label>
            <input type="number" name="price" value="{{ product['price'] }}" step="0.01" required>

            <label>Description</label>
            <textarea name="description" rows="3" required>{{ product['description'] }}</textarea>

            <label>Image Filename</label>
            <input type="text" name="image" value="{{ product['image'] }}" required>

            <button type="submit" class="submit-btn">Save Changes</button>
        </form>

        <a href="/dashboard" class="back-link">← Back to Dashboard</a>
    </div>

</body>
</html>
