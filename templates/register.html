{% extends "base.html" %}
{% block title %}Register — VoltStore{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-card">

        <div class="auth-header">
            <span class="auth-logo">⚡</span>
            <h2>Create Account</h2>
            <p>Join VoltStore today</p>
        </div>

        <form method="POST" class="auth-form">

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="coolname123">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="you@email.com">
            </div>

           <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Min 8 characters">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" required placeholder="Repeat your password">
            </div>

            <button type="submit" class="btn-primary full-width">Create Account →</button>

        </form>

        <p class="auth-switch">
            Already have an account?
            <a href="{{ url_for('login') }}">Login here</a>
        </p>

    </div>
</section>

{% endblock %}
