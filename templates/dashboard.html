<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav>
        <a href="/">Home</a>
        <a href="/product">Products</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/dashboard">Dashboard</a>
    </nav>

    <h1>Admin Dashboard</h1>
    <h3 style="text-align:center;">Total Products: {{ total }}</h3>

    <table border="1" cellpadding="10" style="margin: 20px auto; background: white; border-radius: 10px; box-shadow: 0px 4px 12px rgba(0,0,0,0.1); border-collapse: collapse;">
        <tr style="background-color: #333; color: white;">
            <th>Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Description</th>
        </tr>

        {% for item in products %}
        <tr>
            <td>
                <img src="{{ url_for('static', filename='images/' + item.image) }}" 
                     width="80" height="60" style="object-fit:cover; border-radius:5px;">
            </td>
            <td>{{ item.name }}</td>
            <td class="price">{{ item.price }}</td>
            <td>{{ item.description }}</td>
        </tr>
        {% endfor %}

    </table>

</body>
</html>
