<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 { font-size: 80px; color: #f5c518; margin: 0; }
        h2 { font-size: 30px; margin: 10px 0; }
        p  { color: #aaa; margin-bottom: 30px; }

        .home-btn {
            padding: 12px 25px;
            background: #f5c518;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .home-btn:hover { background: #e6b800; }
    </style>
</head>
<body>
    <div>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist.</p>
        <a href="/" class="home-btn">⚡ Back to VoltStore</a>
    </div>
</body>
</html>
